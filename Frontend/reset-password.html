<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialisation du mot de passe - RideWave</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .reset-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--body-color);
            padding: 20px;
        }

        .reset-card {
            background: var(--container-color);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo-reset {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-color);
        }

        .logo-reset span {
            color: var(--main-color);
        }

        .reset-card h2 {
            margin-bottom: 10px;
            color: var(--text-color);
        }

        .reset-card p {
            margin-bottom: 30px;
            color: var(--container-color);
            color: #888;
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="logo-reset">Ride <span>Wave</span></div>
            <h2>Nouveau mot de passe</h2>
            <p>Veuillez entrer votre nouveau mot de passe ci-dessous.</p>

            <form id="formulaireResetPassword" class="formulaire-modale">
                <div class="groupe-champ">
                    <i class="bx bx-lock-alt"></i>
                    <input type="password" id="nouveauMotDePasse" placeholder="Nouveau mot de passe" required>
                </div>
                <div class="groupe-champ">
                    <i class="bx bx-lock-alt"></i>
                    <input type="password" id="confirmerNouveauMotDePasse" placeholder="Confirmer le mot de passe"
                        required>
                </div>
                <button type="submit" class="btn-soumettre-modale">
                    <span>Réinitialiser</span>
                    <i class="bx bx-check-circle"></i>
                </button>
            </form>
        </div>
    </div>

    <div id="conteneurNotifications"
        style="position: fixed; top: 20px; right: 20px; z-index: 10000; pointer-events: none;"></div>

    <script src="./js/reset-password.js"></script>
</body>

</html>
